# Jenkins Job Builder (JJB) configuration for NIXL project
# This file defines the CI/CD pipeline structure using Jenkins Job Builder templates
# The configuration is split into two main job templates and a project definition
# NOTE: This file is not used directly, it is used to generate the jobs in the Jenkins UI
#       Any changes to this file can only be deployed by Devops team with permissions

# Template for the dispatcher job that handles GitHub webhook events
# This job acts as the entry point for CI/CD pipeline and manages the build process
- job-template:
    name: "{jjb_proj}-dispatcher"  # Will be expanded to 'nixl-ci-dispatcher'
    project-type: pipeline
    properties:
        # GitHub integration settings
        - github:
            url: "{jjb_gh_url}"
        # Build history retention policy
        - build-discarder:
            days-to-keep: 14        # Keep builds for 14 days
            num-to-keep: 1000        # Or keep last 1000 builds, whichever comes first
        # Inject project-specific variables
        - inject:
            keep-system-variables: true
            properties-content: |
              jjb_proj={jjb_proj}-dispatcher
    # Configure webhook trigger for GitHub events
    triggers:
        - generic-webhook-trigger:
            token: "{jjb_proj}-dispatcher"  # Unique token for webhook identification
            print-contributors: true        # Log who triggered the build
            print-posted-content: true      # Log webhook payload
            silent-response: false          # Return detailed response
            cause: "Generic Cause"
            # Extract data from webhook payload
            post-content-params:
            - type: JSONPath
              key: githubData
              value: $
            - type: JSONPath
              key: VARIABLE_FROM_POST
              value: $
    description: Do NOT edit this job through the Web GUI !  # Manual edits will be overwritten
    concurrent: true    # Allow multiple builds to run simultaneously
    sandbox: false
    parameters:
        - string:
            name: "VARIABLE_FROM_POST"
            default: ""
            description: ""
    # Pipeline script that handles the build process
    dsl: |
        @Library('blossom-github-lib@master')  // Use custom GitHub library
        import ipp.blossom.*

        // Authenticate with GitHub using stored credentials
        withCredentials([usernamePassword(credentialsId: 'svc-nixl-github-token', passwordVariable: 'GIT_PASSWORD', usernameVariable: 'GIT_USERNAME')]) {{
          githubHelper = GithubHelper.getInstance("${{GIT_PASSWORD}}", VARIABLE_FROM_POST)
        }}

        // Abort previous dispatcher runs for the same PR and their leaf jobs
        def currentPrNumber = githubHelper.getPRNumber()?.toString()
        if (currentPrNumber) {{
          def slurper = new groovy.json.JsonSlurper()
          try {{
            def staleBuilds = Jenkins.instance.getItemByFullName(env.JOB_NAME).builds.findAll {{
              it.isBuilding() && it.number < currentBuild.number
            }}.findAll {{ b ->
              def gd = b.getAction(hudson.model.ParametersAction)?.getParameters()?.find {{ it.name == 'VARIABLE_FROM_POST' }}?.value
              def otherPr = gd ? slurper.parseText(gd)?.issue?.number?.toString() : null
              otherPr == currentPrNumber
            }}

            if (staleBuilds) {{
              echo "PR #${{currentPrNumber}}: found ${{staleBuilds.size()}} stale dispatcher(s) to abort"
            }}

            // Collect leaf builds from each stale dispatcher's console log
            def leafBuilds = []
            staleBuilds.each {{ b ->
              b.getLog(1000).each {{ line ->
                def m = (line =~ /Starting building: (\S+) #(\d+)/)
                if (m) {{
                  def child = Jenkins.instance.getItemByFullName(m[0][1])?.getBuildByNumber(m[0][2] as int)
                  if (child) leafBuilds.add(child)
                }}
              }}
            }}

            // Kill leaf jobs first (unblocks dispatcher), then dispatchers
            def allTargets = leafBuilds + staleBuilds
            for (int attempt = 1; attempt <= 3; attempt++) {{
              def alive = allTargets.findAll {{ it.isBuilding() }}
              if (!alive) break
              alive.each {{ target ->
                echo "${{attempt > 1 ? 'Retry ' + attempt + ': ' : ''}}Killing ${{target.fullDisplayName}}"
                target.doKill()
              }}
              if (attempt < 3) sleep 5
            }}
          }} catch(Exception e) {{
            echo "Could not abort previous builds: ${{e.message}}"
          }}
        }}

        def blueOceanUrl = "${{JENKINS_URL}}blue/organizations/jenkins/${{env.JOB_BASE_NAME}}/detail/${{env.JOB_BASE_NAME}}/${{env.BUILD_NUMBER}}/pipeline/"
        // Update GitHub commit status
        githubHelper.updateCommitStatus(blueOceanUrl, "NIXL CI started", GitHubCommitState.PENDING)
        currentBuild.description = githubHelper.getBuildDescription()

        try {{
            parallel 'non-gpu': {{
                def jobName = 'nixl-ci-non-gpu'
                build job: jobName, parameters: [
                    string(name: 'sha1', value: githubHelper.getMergedSHA()),
                    string(name: 'githubData', value: VARIABLE_FROM_POST)
                ], propagate: false, wait: true
            }}, 'gpu': {{
                def jobName = 'nixl-ci-gpu'
                build job: jobName, parameters: [
                    string(name: 'sha1', value: githubHelper.getMergedSHA()),
                    string(name: 'githubData', value: VARIABLE_FROM_POST)
                ], propagate: false, wait: true
            }}, 'dl-gpu': {{
                def jobName = 'nixl-ci-dl-gpu'
                build job: jobName, parameters: [
                    string(name: 'sha1', value: githubHelper.getMergedSHA()),
                    string(name: 'githubData', value: VARIABLE_FROM_POST)
                ], propagate: false, wait: true
            }}, 'dl-gpu-ep': {{
                def jobName = 'nixl-ci-dl-gpu-ep'
                build job: jobName, parameters: [
                    string(name: 'sha1', value: githubHelper.getMergedSHA()),
                    string(name: 'githubData', value: VARIABLE_FROM_POST)
                ], propagate: false, wait: true
            }}, wheel: {{
                def buildJob = 'nixl-ci-build-wheel'
                build job: buildJob, parameters: [
                    string(name: 'sha1', value: githubHelper.getMergedSHA()),
                    string(name: 'githubData', value: VARIABLE_FROM_POST)
                ], propagate: false, wait: true
            }}, sanitizers: {{
                def jobName = 'nixl-ci-test-sanitizers'
                build job: jobName, parameters: [
                    string(name: 'sha1', value: githubHelper.getMergedSHA()),
                    string(name: 'githubData', value: VARIABLE_FROM_POST)
                ], propagate: false, wait: true
            }}

            githubHelper.updateCommitStatus(blueOceanUrl, "NIXL CI ended", GitHubCommitState.SUCCESS)
        }} catch(Exception ex) {{
            println ex
            githubHelper.updateCommitStatus(blueOceanUrl, "NIXL CI ended", GitHubCommitState.FAILURE)
            throw ex
        }}

# Template for the main build job that performs the actual build process
- job-template:
    name: "{jjb_proj}-non-gpu"      # Will be expanded to 'nixl-ci-non-gpu'
    project-type: pipeline
    disabled: false
    properties:
        # Similar properties as dispatcher job
        - github:
            url: "{jjb_gh_url}"
        - build-discarder:
            days-to-keep: 14
            num-to-keep: 1000
        - inject:
            keep-system-variables: true
            properties-content: |
              jjb_proj={jjb_proj}-non-gpu
    description: Do NOT edit this job through the Web GUI !
    concurrent: true
    sandbox: true
    # Build job parameters
    parameters:
        - string:
            name: "sha1"
            default: "{jjb_branch}"    # Default to 'main' branch
            description: "Commit to be checked, usually set by PR"
        - string:
            name: "githubData"
            default: ""
            description: "Variables from post"
        - string:
            name: "conf_file"
            default: ".ci/jenkins/lib/build-matrix.yaml"  # Build matrix configuration
            description: "Job config file"
        - bool:
            name: "build_dockers"
            default: false
            description: "Force rebuild docker containers"
        - string:
            name: "DEBUG"
            default: 0
            description: "Enable debug prints and traces, valid values are 0-9"
    # SCM configuration for the build job
    pipeline-scm:
        scm:
            - git:
                url: "{jjb_git}"
                branches: ['$sha1']
                shallow-clone: false
                do-not-fetch-tags: false
                # Configure refspec to handle branches, PRs, and tags
                refspec: "{jjb_gh_refspec}"
                browser: githubweb
                browser-url: "{jjb_git}"
                # Handle git submodules
                submodule:
                    disable: false
                    recursive: true
                    tracking: true
                    parent-credentials: true
        script-path: "{jjb_jenkinsfile}"  # Path to Jenkinsfile that defines the build steps

