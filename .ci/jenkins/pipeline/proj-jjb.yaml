# Jenkins Job Builder (JJB) configuration for NIXL project
# This file defines the CI/CD pipeline structure using Jenkins Job Builder templates
# The configuration is split into two main job templates and a project definition
# NOTE: This file is not used directly, it is used to generate the jobs in the Jenkins UI
#       Any changes to this file can only be deployed by Devops team with permissions

# Template for the dispatcher job that handles GitHub webhook events
# This job acts as the entry point for CI/CD pipeline and manages the build process
- job-template:
    name: "{jjb_proj}-dispatcher"  # Will be expanded to 'nixl-ci-dispatcher'
    project-type: pipeline
    properties:
        # GitHub integration settings
        - github:
            url: "{jjb_gh_url}"
        # Build history retention policy
        - build-discarder:
            days-to-keep: 14        # Keep builds for 14 days
            num-to-keep: 1000        # Or keep last 1000 builds, whichever comes first
        # Inject project-specific variables
        - inject:
            keep-system-variables: true
            properties-content: |
              jjb_proj={jjb_proj}-dispatcher
    # Configure webhook trigger for GitHub events
    triggers:
        - generic-webhook-trigger:
            token: "{jjb_proj}-dispatcher"  # Unique token for webhook identification
            print-contributors: true        # Log who triggered the build
            print-posted-content: true      # Log webhook payload
            silent-response: false          # Return detailed response
            cause: "Generic Cause"
            # Extract data from webhook payload
            post-content-params:
            - type: JSONPath
              key: githubData
              value: $
            - type: JSONPath
              key: VARIABLE_FROM_POST
              value: $
            # Full PR merge ref (refs/pull/<n>/merge) built from the PR number in the
            # /build comment payload via the Jayway JSONPath concat function, so the
            # dispatcher runs the PR merged into its base branch (release branches stay
            # frozen) while manual runs can pass any branch/commit in sha1.
            - type: JSONPath
              key: sha1
              value: '$.concat("refs/pull/", $.issue.number, "/merge")'
    description: Do NOT edit this job through the Web GUI !  # Manual edits will be overwritten
    concurrent: true    # Allow multiple builds to run simultaneously
    sandbox: false
    parameters:
        - string:
            name: "VARIABLE_FROM_POST"
            default: ""
            description: ""
        - string:
            name: "sha1"
            default: "{jjb_branch}"    # Default to 'main' branch for manual runs
            description: "Ref to check out the dispatcher pipeline from. Set to refs/pull/<n>/merge by the webhook; manual runs may pass a branch name, commit SHA, or any ref"
        - string:
            name: "LEAF_JOBS"
            default: "non-gpu,gpu,dl-gpu,dl-gpu-ep,wheel,sanitizers"
            description: "Comma-separated list of leaf jobs to dispatch. Edit the default here (via job config) to temporarily disable a leaf job for all runs without a code change; JJB redeploy restores the full list"
    # SCM configuration - checks out whatever ref sha1 holds: the PR merge ref
    # (set by the webhook) so a PR into a release branch runs that branch's
    # dispatcher, or a branch/commit for manual runs.
    pipeline-scm:
        scm:
            - git:
                url: "{jjb_git}"
                branches: ['$sha1']
                shallow-clone: false
                do-not-fetch-tags: false
                # Configure refspec to handle branches, PRs, and tags
                refspec: "{jjb_gh_refspec}"
                browser: githubweb
                browser-url: "{jjb_git}"
                # Handle git submodules
                submodule:
                    disable: false
                    recursive: true
                    tracking: true
                    parent-credentials: true
        script-path: "{jjb_dispatcher_jenkinsfile}"  # Dispatcher pipeline definition

# Template for the main build job that performs the actual build process
