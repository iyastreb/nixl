# Template for NIXL build container job
# Builds and pushes NIXL and NIXLBench container images for x86_64 and aarch64
# Supports nightly automatic builds and manual builds via parameters
- job-template:
    name: "{jjb_proj}-build-container"
    project-type: pipeline
    disabled: false
    properties:
      - build-discarder:
          days-to-keep: 30
          num-to-keep: 30
      - inject:
          keep-system-variables: true
          properties-content: |
            jjb_proj={jjb_proj}-build-container
            conf_file=.ci/jenkins/lib/build-container-matrix.yaml
    description: >
      <b>NIXL container build</b><br/>
      • Builds and pushes x86_64 &amp; aarch64 images with any NIXL/UCX version combination<br/>
      • Choose between <b>nixlbench</b> or <b>nixl</b> build targets<br/>
      • Optional latest tag update via <code>UPDATE_LATEST</code> parameter<br/>
      • Images pushed to: https://artifactory.nvidia.com/sw-nbu-swx-nixl-docker-local/ <code>verification/nixlbench/</code> or <code>verification/nixl/</code> based on target<br/>
      • You must be part of access-artifactory-nbu-swx-nixl-users DL group in order to work with these images
      <br/>
      <i>Do NOT edit this job through the Jenkins GUI &mdash; managed by Jenkins Job Builder.</i>
    concurrent: true
    sandbox: true
    # Nightly scheduler for automatic builds with default versions
    triggers:
      - parameterized-timer:
          cron: |
            # Build nixlbench nightly around 3 AM - Ubuntu 24.04
            H 3 * * * %BUILD_TARGET=nixlbench;UPDATE_LATEST=true
            # Build nixl nightly around 4 AM - Ubuntu 24.04
            H 4 * * * %BUILD_TARGET=nixl;UPDATE_LATEST=true
            # Build nixlbench nightly around 3 AM - DLFW PyTorch daily
            H 3 * * * %BUILD_TARGET=nixlbench;BASE_IMAGE=gitlab-master.nvidia.com:5005/dl/dgx/pytorch;BASE_IMAGE_TAG=main-py3-devel;UPDATE_LATEST=true
            # Build nixl nightly around 4 AM - DLFW PyTorch daily
            H 4 * * * %BUILD_TARGET=nixl;BASE_IMAGE=gitlab-master.nvidia.com:5005/dl/dgx/pytorch;BASE_IMAGE_TAG=main-py3-devel;UPDATE_LATEST=true
    # Manual build parameters
    parameters:
      - choice:
          name: "BUILD_TARGET"
          choices:
            - "nixlbench"
            - "nixl"
          description: >
            Build target:<br/>
            • <b>nixlbench</b>: Builds NIXLBench container with benchmark tools<br/>
            • <b>nixl</b>: Builds NIXL library container
      - string:
          name: "NIXL_VERSION"
          default: "{jjb_branch}"
          description: "NIXL version to use (tag like 1.4.0, branch name, or commit hash)"
      - string:
          name: "UCX_VERSION"
          default: "v1.22.x"
          description: "UCX version to use (tag like v1.22.x, branch name, or commit hash)"
      - string:
          name: "BASE_IMAGE"
          default: "nvcr.io/nvidia/cuda-dl-base"
          description: "Base Docker image for the container build"
      - string:
          name: "BASE_IMAGE_TAG"
          default: "25.10-cuda13.0-devel-ubuntu24.04"
          description: "Tag for the base Docker image"
      - string:
          name: "TAG_SUFFIX"
          default: ""
          description: >
            Optional tag suffix. Tag format:<br/>
            <code>&lt;base-image-tag&gt;-&lt;nixl-version&gt;-ucx-&lt;ucx-version&gt;-&lt;arch&gt;[-&lt;suffix&gt;]</code><br/>
      - bool:
          name: "UPDATE_LATEST"
          default: false
          description: >
            Update the latest tag for this architecture.<br/>
            When enabled, also creates: <code>&lt;base-image-tag&gt;-&lt;arch&gt;-latest</code><br/>
            Example: <code>25.10-cuda13.0-devel-ubuntu24.04-aarch64-latest</code><br/>
      - bool:
          name: "BUILD_NIXL_EP"
          default: false
          description: "Build NIXL with EP example support (pass --build-nixl-ep)"
      - string:
          name: "MAIL_TO"
          default: "25f58ae0.NVIDIA.onmicrosoft.com@amer.teams.ms"
          description: "Email address to send build results (optional)"
    # SCM configuration
    pipeline-scm:
      scm:
        - git:
            url: "{jjb_git}"
            branches: ['$NIXL_VERSION']
            shallow-clone: false
            do-not-fetch-tags: false
            refspec: "+refs/heads/*:refs/remotes/origin/* +refs/tags/*:refs/remotes/origin/tags/* +$NIXL_VERSION:refs/remotes/origin/$NIXL_VERSION"
            browser: githubweb
            browser-url: "{jjb_git}"
            submodule:
              disable: false
              recursive: true
              tracking: true
              parent-credentials: true
      script-path: "{jjb_jenkinsfile}"

